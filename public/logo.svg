<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" role="img">
  <title>Nicole Stella – Tessera N</title>
  <desc>Immagine homepage: tessera stile Scrabble con lettera N</desc>

  <!-- sfondo trasparente -->

  <!-- ombra tessera -->
  <rect x="84" y="88" width="240" height="268" rx="22" fill="#8B7355" opacity="0.22"/>

  <!-- corpo tessera -->
  <rect x="78" y="80" width="240" height="268" rx="22" fill="#FAC775"/>

  <!-- lucentezza in alto -->
  <rect x="78" y="80" width="240" height="134" rx="22" fill="white" opacity="0.13"/>

  <!-- bordo esterno -->
  <rect x="78" y="80" width="240" height="268" rx="22" fill="none" stroke="#BA7517" stroke-width="2.5"/>

  <!-- bordo interno inciso -->
  <rect x="91" y="93" width="214" height="242" rx="15" fill="none" stroke="#EF9F27" stroke-width="1.8"/>

  <!-- lettera N -->
  <text
    x="198"
    y="310"
    font-size="220"
    font-weight="700"
    font-family="Georgia, 'Times New Roman', serif"
    text-anchor="middle"
    fill="#412402"
    letter-spacing="-2"
  >N</text>

  <!-- punteggio 1 -->
  <text
    x="292"
    y="332"
    font-size="42"
    font-weight="700"
    font-family="Georgia, 'Times New Roman', serif"
    text-anchor="middle"
    fill="#633806"
  >1</text>

</svg>
